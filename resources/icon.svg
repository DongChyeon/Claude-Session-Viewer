<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1726"/>
      <stop offset="100%" stop-color="#130f1e"/>
    </linearGradient>
    <clipPath id="roundRect">
      <rect width="1024" height="1024" rx="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgGrad)"/>

  <!-- Paper document (tilted, right side) -->
  <g clip-path="url(#roundRect)">
    <g transform="translate(596, 490) rotate(14)" filter="url(#shadow)">
      <rect x="-115" y="-160" width="230" height="300" rx="22" fill="#f5f0e8"/>
      <!-- Folded corner -->
      <polygon points="115,-160 115,-110 65,-160" fill="#ddd8cc"/>
      <!-- Text lines -->
      <rect x="-78" y="-108" width="150" height="13" rx="6.5" fill="#b8b2a8"/>
      <rect x="-78" y="-82"  width="130" height="13" rx="6.5" fill="#b8b2a8"/>
      <rect x="-78" y="-56"  width="142" height="13" rx="6.5" fill="#b8b2a8"/>
      <rect x="-78" y="-30"  width="108" height="13" rx="6.5" fill="#b8b2a8"/>
      <rect x="-78" y="0"    width="136" height="13" rx="6.5" fill="#b8b2a8"/>
      <rect x="-78" y="26"   width="118" height="13" rx="6.5" fill="#b8b2a8"/>
      <rect x="-78" y="52"   width="144" height="13" rx="6.5" fill="#b8b2a8"/>
      <rect x="-78" y="78"   width="98"  height="13" rx="6.5" fill="#b8b2a8"/>
    </g>
  </g>

  <!-- Claude orbital arcs (concentric curved lines, left-center) -->
  <g transform="translate(430, 512)">
    <!-- Outermost arc -->
    <path d="M 40,-230 A240,240 0 1,0 40,230"
          stroke="#D4805A" stroke-width="62" fill="none"
          stroke-linecap="round" opacity="1.0"/>
    <!-- Middle arc -->
    <path d="M 40,-140 A150,150 0 1,0 40,140"
          stroke="#D4805A" stroke-width="58" fill="none"
          stroke-linecap="round" opacity="0.72"/>
    <!-- Inner arc -->
    <path d="M 40,-52 A60,60 0 1,0 40,52"
          stroke="#D4805A" stroke-width="52" fill="none"
          stroke-linecap="round" opacity="0.44"/>
  </g>
</svg>
