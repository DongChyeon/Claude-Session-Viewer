<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="docshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="roundRect">
      <rect width="1024" height="1024" rx="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#1e1a2e"/>

  <!-- Claude Code logo (pixel art) centered, scaled up -->
  <image href="data:image/png;base64,"
         x="112" y="100" width="800" height="800"
         clip-path="url(#roundRect)"
         image-rendering="pixelated"/>

  <!-- Document icon — bottom right corner -->
  <g clip-path="url(#roundRect)">
    <g transform="translate(695, 680)" filter="url(#docshadow)">
      <!-- Paper body -->
      <rect x="0" y="0" width="210" height="265" rx="20" fill="#f5f0e8"/>
      <!-- Folded corner -->
      <polygon points="210,0 210,55 155,0" fill="#ddd8cc"/>
      <!-- Text lines -->
      <rect x="28" y="52"  width="140" height="12" rx="6" fill="#b8b2a8"/>
      <rect x="28" y="76"  width="120" height="12" rx="6" fill="#b8b2a8"/>
      <rect x="28" y="100" width="134" height="12" rx="6" fill="#b8b2a8"/>
      <rect x="28" y="124" width="104" height="12" rx="6" fill="#b8b2a8"/>
      <rect x="28" y="148" width="128" height="12" rx="6" fill="#b8b2a8"/>
      <rect x="28" y="172" width="112" height="12" rx="6" fill="#b8b2a8"/>
    </g>
  </g>
</svg>
